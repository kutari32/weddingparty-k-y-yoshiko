<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            perspective: 1200px;
        }

        #instruction {
            position: absolute; top: 15%; width: 90%;
            text-align: center; color: #b19494;
            z-index: 100;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        body.open #instruction { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        .wrapper {
            position: relative; width: 260px; height: 180px;
            display: flex; justify-content: center; align-items: center;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            animation: floating 3s ease-in-out infinite; 
        }
        body.open .envelope { animation: none; }

        .flap, .pocket-front, .pocket-back {
            position: absolute;
            transition: transform 0.8s ease, opacity 1.5s ease;
        }

        .flap {
            top: 0; left: 0; width: 0; height: 0;
            border-left: 130px solid transparent; border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top; z-index: 30;
        }
        body.open .flap { transform: rotateX(180deg); z-index: 1; }

        .pocket-back {
            top: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-accent); border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        .pocket-front {
            bottom: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px; 
            z-index: 20;
        }

        .letter {
            position: absolute; 
            bottom: 5px;
            /* センターに配置するための修正 */
            left: 50%;
            width: 240px; height: 170px;
            background-color: var(--paper-white);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            padding: 8px; box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
            opacity: 0; visibility: hidden;
            
            transform-style: preserve-3d;
            /* translateX(-50%) で中央揃えを維持 */
            transform: translateX(-50%) rotateY(0deg);
        }

        .letter img {
            max-width: 100%; max-height: 100%;
            object-fit: contain; border-radius: 4px;
            backface-visibility: hidden;
            transform: rotateY(180deg); 
        }

        body.open .letter {
            visibility: visible; opacity: 1;
            animation: windDance 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 1s; 
        }

        body.open .flap, body.open .pocket-front, body.open .pocket-back {
            opacity: 0.15; transition-delay: 2.5s;
        }

        @keyframes windDance {
            0% { 
                /* translateX(-50%) をベースにアニメーション */
                transform: translate(-50%, 0) rotate(0deg) rotateY(0deg) scale(1); 
                z-index: 10; 
            }
            /* 真上に引き抜く（センター維持） */
            30% { 
                transform: translate(-50%, -190px) rotate(0deg) rotateY(0deg) scale(1); 
                z-index: 10; 
            }
            31% {
                transform: translate(-50%, -190px) rotate(0deg) rotateY(0deg) scale(1);
                z-index: 50; 
            }
            /* ひらひら（センターから左右に振る） */
            50% { 
                transform: translate(-70%, -250px) rotate(-15deg) rotateY(0deg) scale(1.1); 
            }
            70% { 
                transform: translate(-30%, -330px) rotate(20deg) rotateY(0deg) scale(1.2); 
            }
            88% { 
                transform: translate(-55%, -200px) rotate(-5deg) rotateY(90deg) scale(1.3); 
            }
            100% { 
                /* 最後もセンター付近で画像を表示 */
                transform: translate(-50%, -100px) rotate(0deg) rotateY(180deg) scale(1.35); 
                z-index: 50; 
                box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @media (max-width: 350px) {
            @keyframes windDance {
                100% { transform: translate(-50%, -100px) rotate(0deg) rotateY(180deg) scale(1.15); }
            }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.2rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <img src="母.jpg" alt="Special Message">
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
            }
        }
    </script>
</body>
</html>
