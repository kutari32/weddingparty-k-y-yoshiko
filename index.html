<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
            --base-w: 240px;
            --base-h: 170px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
            perspective: 2000px;
        }

        #instruction {
            position: absolute; top: 15%; width: 90%;
            text-align: center; color: #b19494;
            z-index: 100;
            transition: opacity 0.5s;
        }
        body.open #instruction { opacity: 0; pointer-events: none; }

        .wrapper {
            position: relative; width: 260px; height: 180px;
            transform-style: preserve-3d;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: floating 3s ease-in-out infinite; 
            z-index: 10;
        }
        body.open .envelope { animation: none; }

        /* --- 封筒パーツを途中で消すアニメーション --- */
        @keyframes fadeOutEnvelope {
            0%, 25% { opacity: 1; visibility: visible; }
            35%, 100% { opacity: 0; visibility: hidden; }
        }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 130px solid transparent; border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top; 
            z-index: 40;
            transition: transform 0.6s ease-in-out;
        }
        body.open .flap { 
            transform: rotateX(180deg); 
            z-index: 1; 
            transition: transform 0.6s ease-in-out, z-index 0s 0.6s; 
            animation: fadeOutEnvelope 5s linear forwards;
            animation-delay: 0.7s;
        }

        .pocket-back {
            position: absolute; top: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-accent); border-radius: 0 0 15px 15px;
            z-index: 5;
        }
        body.open .pocket-back {
            animation: fadeOutEnvelope 5s linear forwards;
            animation-delay: 0.7s;
        }

        .pocket-front {
            position: absolute; bottom: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px; 
            z-index: 20;
        }
        body.open .pocket-front {
            animation: fadeOutEnvelope 5s linear forwards;
            animation-delay: 0.7s;
        }

        .letter {
            position: absolute; 
            width: var(--base-w);
            height: var(--base-h);
            left: 10px;
            bottom: 10px;
            z-index: 10;
            transform-style: preserve-3d;
            transform: translateY(0) rotateY(0deg) scale(1);
            transform-origin: center center;
        }

        .letter-front { 
            position: absolute; inset: 0;
            background-color: var(--paper-white);
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            backface-visibility: hidden;
            z-index: 2; 
        }
        
        .letter-back { 
            position: absolute; inset: 0;
            backface-visibility: hidden;
            z-index: 1; 
            transform: rotateY(180deg);
            opacity: 0; 
            display: flex; justify-content: center; align-items: center;
        }

        .letter-back img { 
            width: 100%; 
            height: 100%; 
            filter: drop-shadow(0 15px 40px rgba(0,0,0,0.3)); 
            border-radius: 8px;
        }

        body.open .letter {
            animation: windDance 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.7s; 
        }

        body.open .letter-front {
            animation: fadeOutPaper 5s linear forwards;
            animation-delay: 0.7s;
        }
        body.open .letter-back {
            animation: fadeInImage 5s linear forwards;
            animation-delay: 0.7s;
        }

        @keyframes windDance {
            /* 1. 封筒の中に静止 */
            0% { transform: translateY(0) rotateY(0deg) scale(1); z-index: 10; }
            
            /* 2. 上昇：封筒の口から出る */
            30% { transform: translateY(-195px) rotateY(0deg) scale(1); z-index: 10; }
            
            /* 3. 離脱：前面ポケットを確実に追い越す（ここで封筒は消え始める） */
            31% { transform: translateY(-195px) translateZ(100px) rotateY(0deg) scale(1); z-index: 50; }
            
            /* 4. ひらひら舞う：多軸回転で「手紙らしさ」を表現 */
            60% { 
                transform: translateY(-260px) translateX(-15%) translateZ(200px) 
                           rotate(-15deg) rotateY(95deg) scale(1.4); 
            }
            
            /* 5. 最終：反転して画面いっぱいに拡大 */
            100% { 
                transform: translateY(-110px) translateZ(0px) rotateY(180deg) 
                           scale(calc(96vw / var(--base-w))); 
                z-index: 100; 
            }
        }

        @keyframes fadeOutPaper { 
            0%, 58% { opacity: 1; } 
            62%, 100% { opacity: 0; } 
        }

        @keyframes fadeInImage { 
            0%, 58% { opacity: 0; } 
            62%, 100% { opacity: 1; } 
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.2rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">画面をタップしてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <div class="letter-front"></div>
                <div class="letter-back">
                    <img src="母.jpg" alt="Message">
                </div>
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
            }
        }
    </script>
</body>
</html>
