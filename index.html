<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            perspective: 1500px; /* 奥行きをより深く */
        }

        #instruction {
            position: absolute; top: 10%; width: 90%;
            text-align: center; color: #b19494;
            z-index: 100;
            transition: opacity 0.8s ease-out;
        }
        body.open #instruction { opacity: 0; pointer-events: none; }

        .wrapper {
            position: relative; width: 260px; height: 180px;
            display: flex; justify-content: center; align-items: center;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            animation: floating 3s ease-in-out infinite; 
        }
        body.open .envelope { animation: none; }

        .flap, .pocket-front, .pocket-back {
            position: absolute;
            transition: transform 0.8s ease, opacity 1.5s ease;
        }

        .flap {
            top: 0; left: 0; width: 0; height: 0;
            border-left: 130px solid transparent; border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top; z-index: 30;
        }
        body.open .flap { transform: rotateX(180deg); z-index: 1; }

        .pocket-back {
            top: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-accent); border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        .pocket-front {
            bottom: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px; z-index: 20;
        }

        /* --- 手紙（画像のみ）の修正 --- */
        .letter {
            position: absolute; 
            bottom: 20px;
            left: 50%;
            width: 95vw; /* 画面幅いっぱい */
            max-width: 600px;
            height: auto;
            background-color: transparent; /* 白背景を撤廃 */
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            opacity: 0; visibility: hidden;
            transform-style: preserve-3d;
            /* 初期状態：中央・縮小・裏向き */
            transform: translate(-50%, 0) rotateY(0deg) scale(0.3);
        }

        .letter img {
            width: 100%;
            height: auto;
            max-height: 80vh; /* 縦長画像でも画面内に収める */
            object-fit: contain;
            /* 画像の裏側を見せない（舞っている間は透明に近い白い板に見える） */
            backface-visibility: hidden;
            transform: rotateY(180deg);
            /* 最後に表示される時に影をつける演出 */
            filter: drop-shadow(0 0 0 rgba(0,0,0,0));
            transition: filter 1s ease;
        }

        body.open .letter {
            visibility: visible; opacity: 1;
            animation: windDance 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 1s; 
        }

        body.open .letter img {
            /* 最後にふわっと影が出るようにする（アニメーション完了時に合わせる） */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
            transition-delay: 4.5s;
        }

        body.open .flap, body.open .pocket-front, body.open .pocket-back {
            opacity: 0.1; transition-delay: 3.5s;
        }

        @keyframes windDance {
            0% { 
                transform: translate(-50%, 0) rotate(0deg) rotateY(0deg) scale(0.3); 
                z-index: 10; 
            }
            /* 垂直に引き抜く：封筒の口を抜けるまでスケールを抑える */
            30% { 
                transform: translate(-50%, -200px) rotate(0deg) rotateY(0deg) scale(0.5); 
                z-index: 10; 
            }
            31% {
                z-index: 50; 
            }
            /* ひらひら：サイズを滑らかに大きくしていく */
            50% { 
                transform: translate(-65%, -300px) rotate(-15deg) rotateY(0deg) scale(0.7); 
            }
            75% { 
                transform: translate(-35%, -350px) rotate(15deg) rotateY(45deg) scale(0.85); 
            }
            90% { 
                transform: translate(-52%, -55%) rotate(-2deg) rotateY(120deg) scale(0.95); 
            }
            100% { 
                /* 画面中央に最大化 */
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(0deg) rotateY(180deg) scale(1); 
                z-index: 200; 
            }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.1rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.8rem; margin-top: 8px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <img src="母.jpg" alt="Special Message">
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
            }
        }
    </script>
</body>
</html>
