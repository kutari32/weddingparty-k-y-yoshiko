<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            perspective: 1200px;
        }

        #instruction {
            position: absolute; top: 10%; width: 90%;
            text-align: center; color: #b19494;
            z-index: 100;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        body.open #instruction { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        .wrapper {
            position: relative; width: 260px; height: 180px;
            display: flex; justify-content: center; align-items: center;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            animation: floating 3s ease-in-out infinite; 
        }
        body.open .envelope { animation: none; }

        .flap, .pocket-front, .pocket-back {
            position: absolute;
            transition: transform 0.8s ease, opacity 1.5s ease;
        }

        .flap {
            top: 0; left: 0; width: 0; height: 0;
            border-left: 130px solid transparent; border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top; z-index: 30;
        }
        body.open .flap { transform: rotateX(180deg); z-index: 1; }

        .pocket-back {
            top: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-accent); border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        .pocket-front {
            bottom: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px; 
            z-index: 20;
        }

        /* --- 手紙のレスポンシブ修正 --- */
        .letter {
            position: absolute; 
            bottom: 5px;
            left: 50%;
            /* 画面幅に合わせてサイズを自動調整 */
            width: 85vw; 
            max-width: 500px; /* PCなど大きすぎる画面用の制限 */
            height: auto;
            min-height: 150px;
            background-color: var(--paper-white);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            padding: 10px; box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
            opacity: 0; visibility: hidden;
            
            transform-style: preserve-3d;
            /* 最初は封筒のサイズ(scale 0.5付近)に合わせて縮小しておき、飛び出す時に等倍に戻す */
            transform: translate(-50%, 0) rotateY(0deg) scale(0.6);
        }

        .letter img {
            width: 100%;
            height: auto;
            max-height: 70vh; /* 縦長画像でも画面を突き抜けないように */
            object-fit: contain; 
            border-radius: 4px;
            backface-visibility: hidden;
            transform: rotateY(180deg); 
        }

        body.open .letter {
            visibility: visible; opacity: 1;
            animation: windDance 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 1s; 
        }

        body.open .flap, body.open .pocket-front, body.open .pocket-back {
            opacity: 0.15; transition-delay: 3s;
        }

        @keyframes windDance {
            0% { 
                transform: translate(-50%, 0) rotate(0deg) rotateY(0deg) scale(0.6); 
                z-index: 10; 
            }
            /* 封筒から抜ける動き（徐々に大きくする） */
            30% { 
                transform: translate(-50%, -200px) rotate(0deg) rotateY(0deg) scale(0.8); 
                z-index: 10; 
            }
            31% {
                transform: translate(-50%, -200px) rotate(0deg) rotateY(0deg) scale(0.8);
                z-index: 50; 
            }
            /* ひらひら舞う（画面サイズに合わせてダイナミックに） */
            50% { 
                transform: translate(-65%, -300px) rotate(-10deg) rotateY(0deg) scale(0.9); 
            }
            75% { 
                transform: translate(-35%, -350px) rotate(10deg) rotateY(45deg) scale(1.0); 
            }
            90% { 
                transform: translate(-52%, -50%) rotate(-2deg) rotateY(120deg) scale(1.0); 
            }
            100% { 
                /* 画面中央(50% 50%)付近に大きく表示 */
                position: fixed; /* 最後に画面中央に固定するイメージ */
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(0deg) rotateY(180deg) scale(1.0); 
                z-index: 200; 
                box-shadow: 0 20px 80px rgba(0,0,0,0.3);
            }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.1rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.8rem; margin-top: 8px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <img src="母.jpg" alt="Special Message">
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
            }
        }
    </script>
</body>
</html>
