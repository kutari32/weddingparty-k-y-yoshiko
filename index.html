<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-soft-pink);
            overflow: hidden;
            cursor: pointer;
            perspective: 1200px;
        }

        /* 案内テキスト：絶対配置で固定 */
        #instruction {
            position: absolute; top: 10%; width: 100%;
            text-align: center; color: #b19494;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        body.open #instruction { opacity: 0; pointer-events: none; }

        .wrapper {
            position: relative; width: 260px; height: 180px;
            transform-style: preserve-3d;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: floating 3s ease-in-out infinite; 
            z-index: 10;
        }
        body.open .envelope { animation: none; }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 130px solid transparent; border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top; z-index: 40;
            transition: transform 0.6s ease-in-out;
        }
        body.open .flap { transform: rotateX(180deg); z-index: 1; }

        .pocket-back {
            position: absolute; top: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-accent); border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        .pocket-front {
            position: absolute; bottom: 0; left: 0; width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px; z-index: 20;
        }

        /* --- 手紙・画像本体 --- */
        .letter-container {
            position: absolute; bottom: 5px; left: 50%;
            width: 240px; height: 170px;
            transform: translateX(-50%);
            transform-style: preserve-3d;
            z-index: 10;
        }

        .letter-body {
            position: absolute; inset: 0;
            background-color: var(--paper-white);
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            backface-visibility: hidden;
            z-index: 2;
        }

        /* 画像：最初は透明、最後は画面基準で最大化 */
        .image-overlay {
            position: fixed; /* 画面全体を基準にする */
            top: 50%; left: 50%;
            width: 95vw; height: auto;
            max-width: 600px; /* PCでの見栄え用 */
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            z-index: 2000;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
        }

        .image-overlay img {
            width: 100%; height: auto;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: block;
        }

        body.open .letter-container {
            animation: ejectLetter 1.5s ease-in-out forwards;
        }

        /* アニメーション：封筒から出る動きだけに専念 */
        @keyframes ejectLetter {
            0% { transform: translate(-50%, 0); z-index: 10; }
            50% { transform: translate(-50%, -200px); z-index: 10; }
            51% { z-index: 500; }
            100% { transform: translate(-50%, -150px) rotateY(180deg) scale(0); opacity: 0; }
        }

        /* 画像がドーンと出る演出（JSでタイミングを制御） */
        body.open .image-overlay.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.2rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">画面をタップしてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter-container">
                <div class="letter-body"></div>
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <div class="image-overlay" id="finalImage">
        <img src="母.jpg" alt="Message">
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
                
                // 手紙が舞い上がったタイミングで画像を中央に表示
                setTimeout(() => {
                    document.getElementById('finalImage').classList.add('active');
                }, 1600); // アニメーションに合わせて調整
            }
        }
    </script>
</body>
</html>
